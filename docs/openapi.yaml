openapi: 3.1.0
info:
  title: Diary API
  version: 0.0.1
  description: JWT 기반 개인 일기 및 Todo API
servers:
  - url: http://localhost:8080
    description: Local server
security:
  - bearerAuth: []
paths:
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/users/me:
    get:
      tags: [Users]
      summary: 현재 사용자 기본 정보 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/users/me/detail:
    get:
      tags: [Users]
      summary: 현재 사용자 상세 정보 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/diaries:
    get:
      tags: [Diaries]
      summary: 일기 목록 조회
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: mood
          in: query
          schema:
            type: string
        - name: favorite
          in: query
          schema:
            type: boolean
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Diaries]
      summary: 일기 작성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiaryCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/diaries/search:
    get:
      tags: [Diaries]
      summary: 일기 검색
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/diaries/{diaryId}:
    get:
      tags: [Diaries]
      summary: 일기 상세 조회
      parameters:
        - $ref: '#/components/parameters/DiaryId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Diaries]
      summary: 일기 수정
      parameters:
        - $ref: '#/components/parameters/DiaryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiaryUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Diaries]
      summary: 일기 삭제
      parameters:
        - $ref: '#/components/parameters/DiaryId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/diaries/{diaryId}/favorite:
    patch:
      tags: [Diaries]
      summary: 즐겨찾기 토글
      parameters:
        - $ref: '#/components/parameters/DiaryId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/diaries/{diaryId}/revisions:
    get:
      tags: [Diaries]
      summary: 일기 수정 이력 조회
      parameters:
        - $ref: '#/components/parameters/DiaryId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryRevisionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/diaries/{diaryId}/revisions/{revisionId}/restore:
    post:
      tags: [Diaries]
      summary: 일기 수정 이력 복원
      parameters:
        - $ref: '#/components/parameters/DiaryId'
        - name: revisionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/diaries/statistics/summary:
    get:
      tags: [Diaries]
      summary: 일기 요약 통계
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryStatisticsSummary'
  /api/diaries/statistics/mood:
    get:
      tags: [Diaries]
      summary: 기분별 일기 통계
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryMoodStatistics'
  /api/diaries/statistics/monthly:
    get:
      tags: [Diaries]
      summary: 월별 일기 통계
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryMonthlyStatistics'
  /api/diaries/statistics/streak:
    get:
      tags: [Diaries]
      summary: 연속 작성 통계
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryStreakStatistics'
  /api/todos:
    post:
      tags: [Todos]
      summary: Todo 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Todos]
      summary: 날짜별 Todo 목록 조회
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/todos/{todoId}:
    get:
      tags: [Todos]
      summary: Todo 상세 조회
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Todos]
      summary: Todo 수정
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Todos]
      summary: Todo 삭제
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/todos/{todoId}/complete:
    patch:
      tags: [Todos]
      summary: Todo 완료 처리
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
  /api/todos/{todoId}/uncomplete:
    patch:
      tags: [Todos]
      summary: Todo 미완료 처리
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
  /api/todos/statistics/daily:
    get:
      tags: [Todos]
      summary: Todo 일별 통계
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoDailyStatisticsResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
    DiaryId:
      name: diaryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TodoId:
      name: todoId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SignupRequest:
      type: object
      required: [email, password, nickname]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        nickname:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserInfo'
    UserInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
        nickname:
          type: string
        role:
          type: string
    UserResponse:
      allOf:
        - $ref: '#/components/schemas/UserInfo'
        - type: object
          properties:
            status:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    DiaryCreateRequest:
      type: object
      required: [writtenDate, title, content]
      properties:
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
          default: PRIVATE
        weather:
          type: string
    DiaryUpdateRequest:
      type: object
      properties:
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        isFavorite:
          type: boolean
    DiaryResponse:
      type: object
      properties:
        diaryId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        isFavorite:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DiaryPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DiaryResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
    DiaryRevisionResponse:
      type: object
      properties:
        revisionId:
          type: integer
          format: int64
        diaryId:
          type: integer
          format: int64
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        favorite:
          type: boolean
        editedAt:
          type: string
          format: date-time
    DiaryRevisionsResponse:
      type: object
      properties:
        current:
          $ref: '#/components/schemas/DiaryResponse'
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/DiaryRevisionResponse'
        totalRevisions:
          type: integer
    DiaryStatisticsSummary:
      type: object
      properties:
        totalCount:
          type: integer
        thisMonthCount:
          type: integer
        favoriteCount:
          type: integer
    DiaryMoodStatistics:
      type: object
      properties:
        moodCounts:
          type: object
          additionalProperties:
            type: integer
        totalCount:
          type: integer
    DiaryMonthlyStatistics:
      type: object
      properties:
        year:
          type: integer
        monthlyCounts:
          type: array
          items:
            type: integer
        totalCount:
          type: integer
    DiaryStreakStatistics:
      type: object
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
    TodoCreateRequest:
      type: object
      required: [todoDate, title]
      properties:
        todoDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        priority:
          type: string
          default: MEDIUM
    TodoUpdateRequest:
      type: object
      properties:
        todoDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        priority:
          type: string
    TodoResponse:
      type: object
      properties:
        todoId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        todoDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        status:
          type: string
        priority:
          type: string
        sourceType:
          type: string
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TodoDailyStatisticsResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        totalCount:
          type: integer
        doneCount:
          type: integer
        achievementRate:
          type: number
          format: double
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              value:
                type: string
              reason:
                type: string
