openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/todos/{todoId}:
    get:
      tags:
      - todo-controller
      operationId: getTodo
      parameters:
      - name: todoId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoResponse"
    put:
      tags:
      - todo-controller
      operationId: updateTodo
      parameters:
      - name: todoId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoResponse"
    delete:
      tags:
      - todo-controller
      operationId: deleteTodo
      parameters:
      - name: todoId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/diaries/{diaryId}:
    get:
      tags:
      - diary-controller
      operationId: getDiary
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryResponse"
    put:
      tags:
      - diary-controller
      operationId: updateDiary
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiaryUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryResponse"
    delete:
      tags:
      - diary-controller
      operationId: deleteDiary
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/todos:
    get:
      tags:
      - todo-controller
      operationId: getTodosByDate
      parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - TODO
          - DONE
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoResponse"
    post:
      tags:
      - todo-controller
      operationId: createTodo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoResponse"
  /api/diaries:
    get:
      tags:
      - diary-controller
      operationId: getDiaries
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      - name: filter
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/DiaryFilterRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageResponseDiaryResponse"
    post:
      tags:
      - diary-controller
      operationId: createDiary
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiaryCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryResponse"
  /api/diaries/{diaryId}/revisions/{revisionId}/restore:
    post:
      tags:
      - diary-controller
      operationId: restoreRevision
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: revisionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryResponse"
  /api/auth/signup:
    post:
      tags:
      - auth-controller
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/todos/{todoId}/todo:
    patch:
      tags:
      - todo-controller
      operationId: markAsTodo
      parameters:
      - name: todoId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoResponse"
  /api/todos/{todoId}/done:
    patch:
      tags:
      - todo-controller
      operationId: markAsDone
      parameters:
      - name: todoId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoResponse"
  /api/diaries/{diaryId}/favorite:
    patch:
      tags:
      - diary-controller
      operationId: toggleFavorite
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryResponse"
  /api/users/me:
    get:
      tags:
      - user-controller
      operationId: getCurrentUser
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserInfo"
  /api/users/me/detail:
    get:
      tags:
      - user-controller
      operationId: getCurrentUserDetail
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/todos/statistics/daily:
    get:
      tags:
      - todo-controller
      operationId: getDailyStatistics
      parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TodoDailyStatisticsResponse"
  /api/diaries/{diaryId}/revisions:
    get:
      tags:
      - diary-controller
      operationId: getRevisions
      parameters:
      - name: diaryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryRevisionsResponse"
  /api/diaries/statistics/summary:
    get:
      tags:
      - diary-controller
      operationId: getStatisticsSummary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryStatisticsSummary"
  /api/diaries/statistics/streak:
    get:
      tags:
      - diary-controller
      operationId: getStreakStatistics
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryStreakStatistics"
  /api/diaries/statistics/mood:
    get:
      tags:
      - diary-controller
      operationId: getMoodStatistics
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryMoodStatistics"
  /api/diaries/statistics/monthly:
    get:
      tags:
      - diary-controller
      operationId: getMonthlyStatistics
      parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiaryMonthlyStatistics"
  /api/diaries/search:
    get:
      tags:
      - diary-controller
      operationId: searchDiaries
      parameters:
      - name: keyword
        in: query
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageResponseDiaryResponse"
components:
  schemas:
    TodoUpdateRequest:
      type: object
      properties:
        todoDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        priority:
          type: string
          enum:
          - HIGH
          - MEDIUM
          - LOW
    TodoResponse:
      type: object
      properties:
        todoId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        todoDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum:
          - TODO
          - DONE
        priority:
          type: string
          enum:
          - HIGH
          - MEDIUM
          - LOW
        originType:
          type: string
          enum:
          - MANUAL
          - AI_SUGGESTED
          - ROUTINE_GENERATED
        modifiedAfterCreation:
          type: boolean
        routineId:
          type: integer
          format: int64
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DiaryUpdateRequest:
      type: object
      properties:
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        isFavorite:
          type: boolean
    DiaryResponse:
      type: object
      properties:
        diaryId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        isFavorite:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TodoCreateRequest:
      type: object
      properties:
        todoDate:
          type: string
          format: date
        title:
          type: string
          minLength: 1
        content:
          type: string
        priority:
          type: string
          enum:
          - HIGH
          - MEDIUM
          - LOW
      required:
      - title
      - todoDate
    DiaryCreateRequest:
      type: object
      properties:
        writtenDate:
          type: string
          format: date
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
      required:
      - content
      - title
      - writtenDate
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 4
        nickname:
          type: string
          minLength: 1
      required:
      - email
      - nickname
      - password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
    UserInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
        nickname:
          type: string
        role:
          type: string
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - email
      - password
    UserResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
        nickname:
          type: string
        role:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TodoDailyStatisticsResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        totalCount:
          type: integer
          format: int32
        doneCount:
          type: integer
          format: int32
        achievementRate:
          type: number
          format: double
    DiaryFilterRequest:
      type: object
      properties:
        mood:
          type: string
        favorite:
          type: boolean
        keyword:
          type: string
    PageResponseDiaryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/DiaryResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
    DiaryRevisionResponse:
      type: object
      properties:
        revisionId:
          type: integer
          format: int64
        diaryId:
          type: integer
          format: int64
        writtenDate:
          type: string
          format: date
        title:
          type: string
        content:
          type: string
        mood:
          type: string
        visibility:
          type: string
        weather:
          type: string
        favorite:
          type: boolean
        editedAt:
          type: string
          format: date-time
    DiaryRevisionsResponse:
      type: object
      properties:
        current:
          $ref: "#/components/schemas/DiaryResponse"
        revisions:
          type: array
          items:
            $ref: "#/components/schemas/DiaryRevisionResponse"
        totalRevisions:
          type: integer
          format: int32
    DiaryStatisticsSummary:
      type: object
      properties:
        totalCount:
          type: integer
          format: int32
        thisMonthCount:
          type: integer
          format: int32
        favoriteCount:
          type: integer
          format: int32
    DiaryStreakStatistics:
      type: object
      properties:
        currentStreak:
          type: integer
          format: int32
        longestStreak:
          type: integer
          format: int32
    DiaryMoodStatistics:
      type: object
      properties:
        moodCounts:
          type: object
          additionalProperties:
            type: integer
            format: int32
        totalCount:
          type: integer
          format: int32
    DiaryMonthlyStatistics:
      type: object
      properties:
        year:
          type: integer
          format: int32
        monthlyCounts:
          type: array
          items:
            type: integer
            format: int32
        totalCount:
          type: integer
          format: int32
